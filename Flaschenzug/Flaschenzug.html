<!DOCTYPE html>
<html>
    <head>
        <title>Flaschenzug</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../index.css"/>
        <script src="Src/Flaschenzug.js"></script>
    </head>
    <body onload="onload()">
        <div id="main">
            <header>
                <h1>Flaschenzug</h1>
            </header>
            <div id="result">
                
            </div>
            <article id="open">
                <div>
                    <h2>Öffnen</h2>
                    <p>
                        Hier konnen sie Beispiel öffnen. Die Beispiele von der Website
                        des BWINF sollten funktionieren.
                    </p>
                    <form method="post">
                        <input id="file" type="file" accept="text/plain" style="font-size:15pt;"/>
                    </form>
                    <h2>Oder Einfügen</h2>
                    <p>
                        Zeile 1: Anzahl der Flaschen (N)
                    </p>
                    <p>
                        Zeile 2: Anzahl der Behälter (k)
                    </p>
                    <p>
                        Zeile 3: Fassungsvermögen der Behälter (durch k Zahlen angegeben) 
                    </p>
                    <p><textarea cols="100" rows="2" id="Text"></textarea></p>
                    <p><button style="font-size:15pt;" onclick="Submit()">Bestätigen</button></p>
                </div>
            </article>
            <footer>
                Philipp Haustein
            </footer>
        </div>
    </body>
</html>
