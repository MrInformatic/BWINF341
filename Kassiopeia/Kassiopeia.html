<!DOCTYPE html>
<html>
    <head>
        <title>Kassiopeia</title>
        <meta charset="UTF-8">

                        <input id="file" type="file" accept="text/plain" style="font-size:15pt;"/>
                    </form>
                    <h2>Oder Einfügen</h2>
                    <p><textarea cols="100" rows="10" id="Text"></textarea></p>
                    <p><button style="font-size:15pt;" onclick="Submit()">Bestätigen</button></p>
                </div>
            </article>
            <footer>
                Philipp Haustein
            </footer>
        </div>
